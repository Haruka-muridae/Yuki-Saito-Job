<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者ページ | Yuki Saito</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet">
    <style>
        /* スタイルは変更なしのため維持 */
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#F4F5F7;--surface:#fff;--border:#E2E4E8;--border-lt:#ECEEF2;
            --navy:#1C2B3A;--navy2:#2E4059;--gold:#C9A96E;
            --ink:#1A1A2E;--ink2:#4A4F5C;--ink3:#8A909E;
            --green:#2D9C6E;--green-bg:#EBF7F2;
            --red:#D94F4F;--red-bg:#FDEEEE;
            --yellow:#D4881A;--yellow-bg:#FDF4E3;
            --blue:#2B6CB0;--blue-bg:#EBF4FF;
            --r:6px;
        }
        html,body{height:100%;font-family:'Noto Sans JP',sans-serif;font-size:14px;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;overflow:hidden}
        #login-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--navy)}
        .login-box{background:#fff;border-radius:var(--r);padding:48px 40px;width:360px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.25)}
        .login-logo{width:52px;height:52px;margin:0 auto 20px}
        .login-title{font-size:1.1rem;font-weight:500;color:var(--navy);margin-bottom:6px}
        .login-sub{font-size:.75rem;color:var(--ink3);line-height:1.7;margin-bottom:32px}
        .btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;background:#fff;border:1.5px solid var(--border);border-radius:var(--r);font-family:inherit;font-size:.85rem;font-weight:500;cursor:pointer;transition:.2s}
        .btn-google:hover{background:var(--bg);border-color:var(--navy)}
        #app{display:none;height:100vh;overflow:hidden}
        .shell{display:flex;height:100%;overflow:hidden}
        .sidebar{width:210px;min-width:210px;background:var(--navy);display:flex;flex-direction:column;height:100%;overflow-y:auto;flex-shrink:0}
        .sb-head{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
        .sb-logo{display:flex;align-items:center;gap:10px}
        .sb-logo-mark{width:32px;height:32px;flex-shrink:0}
        .sb-logo-name{font-size:.88rem;font-weight:500;color:#fff}
        .sb-logo-sub{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--gold);letter-spacing:.15em;text-transform:uppercase;margin-top:3px}
        .sb-user{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
        .sb-avatar{width:30px;height:30px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;color:var(--navy);flex-shrink:0}
        .sb-uname{font-size:.78rem;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .sb-uemail{font-size:.65rem;color:rgba(255,255,255,.4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .sb-nav{flex:1;padding:12px 10px}
        .sb-section{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3);padding:12px 8px 6px}
        .nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 10px;border:none;background:none;border-radius:5px;font-family:inherit;font-size:.8rem;color:rgba(255,255,255,.6);cursor:pointer;transition:.15s;text-align:left}
        .nav-btn:hover{background:rgba(255,255,255,.07);color:#fff}
        .nav-btn.active{background:rgba(201,169,110,.15);color:var(--gold)}
        .nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:.6rem;padding:1px 6px;border-radius:10px;font-family:'DM Mono',monospace}
        .sb-foot{padding:12px 10px;border-top:1px solid rgba(255,255,255,.08)}
        .btn-logout{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;background:none;border:none;border-radius:5px;font-family:inherit;font-size:.78rem;color:rgba(255,255,255,.4);cursor:pointer;transition:.15s}
        .btn-logout:hover{background:rgba(217,79,79,.15);color:#ff8080}
        .main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
        .topbar{background:#fff;border-bottom:1px solid var(--border);height:52px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
        .topbar-title{font-size:.9rem;font-weight:500}
        .page{flex:1;overflow-y:auto;padding:24px}
        .panel{display:none}.panel.active{display:block}
        .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
        .stat-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:18px}
        .stat-label{font-size:.7rem;color:var(--ink3);margin-bottom:6px}
        .stat-value{font-size:1.7rem;font-weight:500;font-family:'DM Mono',monospace;color:var(--ink);line-height:1;margin-bottom:6px}
        .badge{display:inline-flex;align-items:center;font-size:.67rem;padding:2px 8px;border-radius:10px}
        .b-green{background:var(--green-bg);color:var(--green)}.b-red{background:var(--red-bg);color:var(--red)}
        .b-yellow{background:var(--yellow-bg);color:var(--yellow)}.b-blue{background:var(--blue-bg);color:var(--blue)}
        .b-gray{background:var(--border-lt);color:var(--ink3)}
        .card{background:#fff;border:1px solid var(--border);border-radius:var(--r);margin-bottom:16px;overflow:hidden}
        .card-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
        .card-title{font-size:.85rem;font-weight:500}
        .card-body{padding:18px}
        table{width:100%;border-collapse:collapse}
        thead th{text-align:left;font-size:.68rem;font-weight:500;color:var(--ink3);padding:9px 14px;border-bottom:1px solid var(--border);background:var(--bg);white-space:nowrap}
        tbody tr{border-bottom:1px solid var(--border-lt);transition:.1s}
        td{padding:11px 14px;font-size:.8rem;color:var(--ink2);vertical-align:middle}
        .form-group{margin-bottom:14px}
        .form-label{display:block;font-size:.75rem;font-weight:500;color:var(--ink2);margin-bottom:5px}
        .form-input,.form-textarea,.form-select{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r);font-family:inherit;font-size:.82rem;color:var(--ink);background:#fff;outline:none}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
        .btn-p{display:inline-flex;align-items:center;gap:6px;background:var(--navy);color:#fff;border:none;border-radius:var(--r);padding:7px 14px;font-family:inherit;font-size:.78rem;font-weight:500;cursor:pointer}
        .btn-s{display:inline-flex;align-items:center;gap:6px;background:#fff;color:var(--ink2);border:1px solid var(--border);border-radius:var(--r);padding:6px 13px;font-family:inherit;font-size:.78rem;cursor:pointer;text-decoration:none}
        .toggle{position:relative;display:inline-block;width:36px;height:20px}
        .toggle input{opacity:0;width:0;height:0}
        .tslider{position:absolute;cursor:pointer;inset:0;background:var(--border);border-radius:20px;transition:.2s}
        .tslider::before{content:'';position:absolute;width:14px;height:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
        .toggle input:checked+.tslider{background:var(--green)}
        .toggle input:checked+.tslider::before{transform:translateX(16px)}
        .toast-wrap{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:7px;pointer-events:none}
        .toast{background:var(--ink);color:#fff;font-size:.78rem;padding:10px 16px;border-radius:var(--r);animation:toastIn .25s ease}
        .toast.ok{background:var(--green)}.toast.ng{background:var(--red)}
        @keyframes toastIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
        .contact-detail{display:none}.contact-detail.open{display:block}
        .url-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-top:8px}
        .url-fields{opacity:.4;pointer-events:none;transition:.2s}
        .url-fields.on{opacity:1;pointer-events:auto}
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <svg class="login-logo" viewBox="0 0 52 52" fill="none">
            <rect x="1" y="1" width="50" height="50" stroke="#1C2B3A" stroke-width="1.5"/>
            <text x="26" y="36" text-anchor="middle" font-family="serif" font-size="24" fill="#1C2B3A">悠</text>
        </svg>
        <p class="login-title">管理者ページ</p>
        <p class="login-sub">Yuki Saito 公式サイト<br>管理者専用ページです</p>
        <button class="btn-google" id="btn-login">Google アカウントでログイン</button>
    </div>
</div>

<div id="app">
    <div class="shell">
        <aside class="sidebar">
            <div class="sb-head">
                <div class="sb-logo">
                    <div class="sb-logo-name">Yuki Saito</div>
                    <div class="sb-logo-sub">Admin Panel</div>
                </div>
            </div>
            <nav class="sb-nav">
                <div class="sb-section">メイン</div>
                <button class="nav-btn active" data-panel="dashboard">ダッシュボード</button>
                <button class="nav-btn" data-panel="contacts">問い合わせ <span class="nav-badge" id="unread-badge">0</span></button>
                <div class="sb-section">コンテンツ</div>
                <button class="nav-btn" data-panel="services">サービス管理</button>
                <button class="nav-btn" data-panel="pricing">料金設定</button>
                <button class="nav-btn" data-panel="profile">プロフィール</button>
                <button class="nav-btn" data-panel="settings">サイト設定</button>
            </nav>
            <div class="sb-foot">
                <button class="btn-logout" id="btn-logout">ログアウト</button>
            </div>
        </aside>

        <div class="main">
            <div class="topbar">
                <span class="topbar-title" id="topbar-title">ダッシュボード</span>
                <a href="/" target="_blank" class="btn-s">サイトを見る</a>
            </div>

            <div class="page">
                <div class="panel active" id="panel-dashboard">
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-label">未読メッセージ</div><div class="stat-value" id="stat-unread">0</div></div>
                    </div>
                    <div class="card">
                        <div class="card-head"><span class="card-title">最近の問い合わせ</span></div>
                        <table><thead><tr><th>氏名</th><th>種別</th><th>受信日時</th><th>状態</th></tr></thead><tbody id="dash-contacts"></tbody></table>
                    </div>
                </div>

                <div class="panel" id="panel-contacts">
                    <div class="card" id="contacts-list-card">
                        <div class="card-head"><span class="card-title">問い合わせ一覧</span></div>
                        <table><thead><tr><th>氏名</th><th>種別</th><th>日時</th><th>ステータス</th><th>操作</th></tr></thead><tbody id="contacts-tbody"></tbody></table>
                    </div>
                    <div class="card contact-detail" id="contact-detail">
                        <div class="card-head"><span class="card-title" id="detail-name">—</span><button class="btn-s" onclick="closeDetail()">一覧に戻る</button></div>
                        <div class="card-body">
                            <div id="detail-meta" style="margin-bottom:20px"></div>
                            <div class="cmessage" id="detail-msg" style="background:#f9f9f9;padding:15px;border-radius:4px;white-space:pre-wrap"></div>
                        </div>
                    </div>
                </div>

                <div class="panel" id="panel-services">
                    <div id="services-list"></div>
                </div>

                <div class="panel" id="panel-pricing">
                    <div class="card">
                        <div class="card-head"><span class="card-title">料金設定</span><button class="btn-p" onclick="savePricingToSheets()">保存する</button></div>
                        <div class="card-body">
                            <div id="pricing-list"></div>
                            <button class="btn-s" onclick="addPricing()" style="margin-top:10px">+ サービス追加</button>
                        </div>
                    </div>
                </div>

                <div class="panel" id="panel-profile">
                    <div class="card">
                        <div class="card-head"><span class="card-title">プロフィール編集</span><button class="btn-p" onclick="saveProfileToSheets()">保存する</button></div>
                        <div class="card-body" id="profile-form">
                            </div>
                    </div>
                </div>

                <div class="panel" id="panel-settings">
                    <div class="card">
                        <div class="card-head"><span class="card-title">CTA リンク設定</span><button class="btn-p" onclick="saveCtaToSheets()">保存する</button></div>
                        <div class="card-body" id="cta-form">
                            </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
// ============================================
// 設定
// ============================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzA-v9yctvKsBYShiRqBZgut78LOWrveixP1borXgO1WjnP0eRvylvkrnQv0jdE-Kar/exec';

let contacts = [];
let pricing = [];
let services = [];
let profile = {};
let cta = {};

const tLabel = {system:'システム', education:'教育', sales:'営業', other:'その他'};
const tBadge = {system:'b-blue', education:'b-green', sales:'b-yellow', other:'b-gray'};

// ============================================
// 通信コア関数
// ============================================
async function callGas(params, method = 'GET') {
    try {
        let url = GAS_URL;
        let options = { method: method };
        if (method === 'GET') {
            const query = new URLSearchParams(params).toString();
            url += '?' + query;
        } else {
            options.body = JSON.stringify(params);
        }
        const res = await fetch(url, options);
        if (!res.ok) throw new Error('Network response was not ok');
        return await res.json();
    } catch (e) {
        console.error('通信エラー:', e);
        toast('通信に失敗しました。', 'ng');
        return null;
    }
}

// ============================================
// 初期化・ログイン
// ============================================
document.getElementById('btn-login').onclick = async () => {
    toast('データ読み込み中...', 'ok');
    
    // 全データをGASから取得
    const [pRes, sRes, cRes, prRes, ctaRes] = await Promise.all([
        callGas({action:'getPricing'}),
        callGas({action:'getServices'}),
        callGas({action:'getContacts'}),
        callGas({action:'getProfile'}),
        callGas({action:'getCta'})
    ]);

    if(pRes) pricing = pRes.pricing;
    if(sRes) services = sRes.services;
    if(cRes) contacts = cRes.contacts;
    if(prRes) profile = prRes.profile;
    if(ctaRes) cta = ctaRes.cta;

    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderAll();
};

function renderAll() {
    renderDashboard();
    renderContacts();
    renderServices();
    renderPricing();
    renderProfile();
    renderCta();
    updateBadge();
}

// ============================================
// 画面切り替え
// ============================================
document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.onclick = () => {
        const panel = btn.dataset.panel;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById('panel-' + panel).classList.add('active');
        document.getElementById('topbar-title').textContent = btn.textContent;
    };
});

// ============================================
// 各パネルの描画・保存処理
// ============================================

// --- 問い合わせ ---
function renderDashboard() {
    const unread = contacts.filter(c => !c.read).length;
    document.getElementById('stat-unread').textContent = unread;
    document.getElementById('dash-contacts').innerHTML = contacts.slice(0, 5).map(c => `
        <tr><td>${c.name}</td><td><span class="badge ${tBadge[c.type]||'b-gray'}">${tLabel[c.type]||c.type}</span></td><td>${c.date}</td><td>${c.read?'既読':'未読'}</td></tr>
    `).join('');
}

function renderContacts() {
    document.getElementById('contacts-tbody').innerHTML = contacts.map(c => `
        <tr onclick="openDetail('${c.id}')" style="cursor:pointer">
            <td>${c.name}</td><td>${tLabel[c.type]||c.type}</td><td>${c.date}</td><td>${c.read?'既読':'未読'}</td>
            <td><button class="btn-s">詳細</button></td>
        </tr>
    `).join('');
}

function openDetail(id) {
    const c = contacts.find(x => x.id == id);
    if(!c) return;
    document.getElementById('detail-name').textContent = c.name;
    document.getElementById('detail-meta').innerHTML = `メール: ${c.email} / 種別: ${c.type}`;
    document.getElementById('detail-msg').textContent = c.message;
    document.getElementById('contacts-list-card').style.display = 'none';
    document.getElementById('contact-detail').classList.add('open');
}

function closeDetail() {
    document.getElementById('contact-detail').classList.remove('open');
    document.getElementById('contacts-list-card').style.display = 'block';
}

// --- 料金 ---
function renderPricing() {
    document.getElementById('pricing-list').innerHTML = pricing.map((p, i) => `
        <div style="display:flex;gap:10px;margin-bottom:10px">
            <input class="form-input" value="${p.service}" onchange="pricing[${i}].service=this.value" placeholder="サービス名">
            <input class="form-input" value="${p.unit}" onchange="pricing[${i}].unit=this.value" placeholder="単位" style="width:80px">
            <input class="form-input" type="number" value="${p.price}" onchange="pricing[${i}].price=this.value" placeholder="金額" style="width:120px">
            <button onclick="pricing.splice(${i},1);renderPricing()" style="color:red;border:none;background:none;cursor:pointer">削除</button>
        </div>
    `).join('');
}

function addPricing() {
    pricing.push({service:'', unit:'時間', price:0});
    renderPricing();
}

async function savePricingToSheets() {
    toast('保存中...', 'ok');
    const res = await callGas({ action: 'savePricing', pricing: pricing }, 'POST');
    if(res && res.success) toast('料金を更新しました', 'ok');
}

// --- サービス ---
function renderServices() {
    document.getElementById('services-list').innerHTML = services.map((s, i) => `
        <div class="card">
            <div class="card-head"><span class="card-title">${s.nameJa}</span><button class="btn-p" onclick="saveServicesToSheets()">保存</button></div>
            <div class="card-body">
                <textarea class="form-textarea" onchange="services[${i}].desc=this.value">${s.desc}</textarea>
                <div class="form-group" style="margin-top:10px">
                    <label class="form-label">ターゲット</label>
                    <input class="form-input" value="${s.target}" onchange="services[${i}].target=this.value">
                </div>
            </div>
        </div>
    `).join('');
}

async function saveServicesToSheets() {
    toast('保存中...', 'ok');
    const res = await callGas({ action: 'saveServices', services: services }, 'POST');
    if(res && res.success) toast('サービスを更新しました', 'ok');
}

// --- プロフィール ---
function renderProfile() {
    const fields = [
        {key:'displayName', label:'表示名'},
        {key:'title', label:'肩書き'},
        {key:'bio', label:'自己紹介'}
    ];
    document.getElementById('profile-form').innerHTML = fields.map(f => `
        <div class="form-group">
            <label class="form-label">${f.label}</label>
            ${f.key==='bio' ? `<textarea class="form-textarea" onchange="profile.${f.key}=this.value">${profile[f.key]||''}</textarea>` : `<input class="form-input" value="${profile[f.key]||''}" onchange="profile.${f.key}=this.value">`}
        </div>
    `).join('');
}

async function saveProfileToSheets() {
    toast('保存中...', 'ok');
    const res = await callGas({ action: 'saveProfile', ...profile }, 'POST');
    if(res && res.success) toast('プロフィールを更新しました', 'ok');
}

// --- CTA ---
function renderCta() {
    document.getElementById('cta-form').innerHTML = Object.keys(cta).map(key => `
        <div class="form-group">
            <label class="form-label">${key}</label>
            <input class="form-input" value="${cta[key]}" onchange="cta['${key}']=this.value">
        </div>
    `).join('');
}

async function saveCtaToSheets() {
    toast('保存中...', 'ok');
    const res = await callGas({ action: 'saveCta', cta: cta }, 'POST');
    if(res && res.success) toast('リンクを更新しました', 'ok');
}

// ============================================
// ユーティリティ
// ============================================
function updateBadge() {
    const n = contacts.filter(c => !c.read).length;
    const b = document.getElementById('unread-badge');
    b.textContent = n;
    b.style.display = n ? 'inline-block' : 'none';
}

function toast(msg, type='') {
    const wrap = document.getElementById('toast-wrap');
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = msg;
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 3000);
}

</script>
</body>
</html>
